services:
  # Core PHP App Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    tty: true
    volumes:
      - ./src:/var/www
    networks:
      - laravel_network

  # Web Server (Using Built-in PHP server targeting the /public directory)
  webserver:
    image: php:8.2-cli
    container_name: laravel_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./src:/var/www
    working_dir: /var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - app
    networks:
      - laravel_network

  # MariaDB Database
  db:
    image: mariadb:11
    container_name: laravel_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: web4jobs_db
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_USER: web4jobs_user
      MARIADB_PASSWORD: user_password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel_network

  # Redis Cache / Queue
  redis:
    image: redis:alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
